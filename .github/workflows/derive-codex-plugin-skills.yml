name: Derive Codex Plugin Skills

on:
  push:
    paths:
      - "Skills/**"
      - "scripts/derive_codex_plugin_skills.py"
      - ".github/workflows/derive-codex-plugin-skills.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  derive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive plugin skills from canonical Skills
        run: python scripts/derive_codex_plugin_skills.py

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet -- plugins/ai-research-feedback/skills; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated plugin skills
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/ai-research-feedback/skills
          git commit -m "chore: derive codex plugin skills"
          git push
